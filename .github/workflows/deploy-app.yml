name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build -f docker/web/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/ai-platform-web:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/ai-platform-web:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ai-platform-web-dev \
            --resource-group ai-platform-rg-dev \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/ai-platform-web:${{ github.sha }}
